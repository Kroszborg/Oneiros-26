<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="description" content="Oneiros-26 — The premier cultural fest." />
  <meta name="theme-color" content="#000000" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Exo+2:wght@400;500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />

  <title>Oneiros-26 | Cultural Fest</title>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      overscroll-behavior: none;
    }

    /* ── CHARACTER STATE BADGE ── */
    #state {
      position: fixed;
      top: max(18px, env(safe-area-inset-top));
      left: max(18px, env(safe-area-inset-left));
      z-index: 40;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #4fffaa;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
      display: none; /* shown by JS after preloader */
    }

    /* ── DESKTOP HUD ── */
    #hud {
      position: fixed;
      bottom: max(20px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      display: none; /* shown by JS after preloader */
      gap: 6px;
      align-items: center;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 9px 16px;
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      font-family: 'Courier New', monospace;
      pointer-events: none;
      white-space: nowrap;
    }
    #hud kbd {
      color: #ddd;
      background: rgba(255,255,255,0.1);
      padding: 1px 7px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.14);
    }
    @media (pointer: coarse) { #hud { display: none !important; } }

    /* ── MOBILE JOYSTICK ── */
    #joystick-zone {
      position: fixed;
      bottom: max(30px, calc(env(safe-area-inset-bottom) + 20px));
      left: max(20px, env(safe-area-inset-left));
      width: 140px;
      height: 140px;
      z-index: 40;
      display: none; /* shown by JS on touch devices, after preloader */
      align-items: center;
      justify-content: center;
      touch-action: none;
    }
    #joystick-base {
      position: relative;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(8, 8, 20, 0.6);
      border: 1.5px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    #joystick-base.sprinting {
      border-color: rgba(255,124,79,0.6);
      box-shadow: 0 0 18px rgba(255,124,79,0.25), inset 0 0 12px rgba(255,124,79,0.1);
    }
    #joystick-knob {
      position: absolute;
      top: 50%; left: 50%;
      width: 44px; height: 44px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.85);
      border: 1.5px solid rgba(255,255,255,0.3);
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      pointer-events: none;
      transition: background 0.15s ease, box-shadow 0.15s ease;
    }
    #joystick-knob.active {
      background: rgba(79,255,170,0.9);
      box-shadow: 0 0 14px rgba(79,255,170,0.55);
    }
    #joystick-knob.sprinting {
      background: rgba(255,124,79,0.9);
      box-shadow: 0 0 14px rgba(255,124,79,0.55);
    }
    #joystick-zone.sprinting::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid rgba(255,124,79,0.35);
      animation: sprintPulse 0.8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes sprintPulse {
      0%, 100% { opacity: 0.35; transform: scale(1); }
      50%       { opacity: 0.7;  transform: scale(1.06); }
    }

    /* ── MOBILE HINTS ── */
    #mobile-hints {
      position: fixed;
      top: max(18px, env(safe-area-inset-top));
      right: max(18px, env(safe-area-inset-right));
      z-index: 40;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.22);
      pointer-events: none;
      display: none;
      text-align: right;
      line-height: 1.7;
    }
    @media (pointer: coarse) {
      #mobile-hints { display: block; }
    }
  </style>
</head>

<body>
  <div id="state">Idle</div>

  <div id="hud">
    <kbd>W A S D</kbd>&nbsp; Move &nbsp;·&nbsp;
    <kbd>Shift</kbd>&nbsp; Sprint &nbsp;·&nbsp;
    <kbd>Drag</kbd>&nbsp; Camera &nbsp;·&nbsp;
    <kbd>Scroll</kbd>&nbsp; Zoom
  </div>

  <div id="mobile-hints">
    SWIPE → CAMERA<br>
    PINCH TO ZOOM<br>
    PUSH FULL = SPRINT
  </div>

  <div id="joystick-zone">
    <div id="joystick-base">
      <div id="joystick-knob"></div>
    </div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
